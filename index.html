<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimReady Asset Browser — NVIDIA Isaac</title>
  <style>
    :root {
      --nv-green:      #76b900;
      --nv-green-dim:  #5a8e00;
      --nv-green-glow: rgba(118,185,0,0.18);
      --bg-base:       #0a0a0a;
      --bg-card:       #141414;
      --bg-panel:      #111111;
      --border:        #252525;
      --border-focus:  #76b900;
      --text-primary:  #f0f0f0;
      --text-secondary:#9a9a9a;
      --text-dim:      #555;
      --radius:        8px;
      --radius-sm:     5px;
      --transition:    0.18s ease;
      --staging-color: #e8a020;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: border-color var(--transition);
    }
    body.staging header { border-bottom-color: var(--staging-color); }

    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0; }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--nv-green);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #000; letter-spacing: -0.5px;
    }
    .logo-text { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .logo-sub  { font-size: 11px; color: var(--nv-green); font-weight: 400; text-transform: uppercase; letter-spacing: 0.8px; }
    .header-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
    .header-title   { font-size: 14px; color: var(--text-secondary); }
    .header-spacer  { flex: 1; }

    /* ── Env toggle ─────────────────────────────────────────────── */
    .env-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .env-btn {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-dim);
      transition: all var(--transition);
    }
    .env-btn:hover { color: var(--text-secondary); }
    .env-btn.active-prod {
      background: var(--nv-green);
      color: #000;
    }
    .env-btn.active-staging {
      background: var(--staging-color);
      color: #000;
    }

    #badge {
      font-size: 12px; color: var(--text-secondary);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px; white-space: nowrap;
    }
    #badge span { color: var(--nv-green); font-weight: 600; }
    body.staging #badge span { color: var(--staging-color); }

    /* ── Staging banner ─────────────────────────────────────────── */
    #staging-banner {
      display: none;
      background: rgba(232,160,32,0.1);
      border-bottom: 1px solid rgba(232,160,32,0.3);
      padding: 7px 32px;
      font-size: 12px;
      color: var(--staging-color);
      gap: 8px;
      align-items: center;
    }
    body.staging #staging-banner { display: flex; }

    /* ── Toolbar ────────────────────────────────────────────────── */
    .toolbar {
      background: var(--bg-panel); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 480px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    #search {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 14px; padding: 9px 12px 9px 36px; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #search:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--nv-green-glow); }
    #search::placeholder { color: var(--text-dim); }
    select {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 13px; padding: 9px 12px; outline: none; cursor: pointer;
    }
    select:focus { border-color: var(--border-focus); }
    select option { background: #1a1a1a; }
    .btn-clear {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-size: 13px; padding: 9px 16px; cursor: pointer;
      transition: all var(--transition);
    }
    .btn-clear:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    /* ── Main ───────────────────────────────────────────────────── */
    main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }
    #state-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 80px 20px; color: var(--text-secondary);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--nv-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    body.staging .spinner { border-top-color: var(--staging-color); }
    @keyframes spin { to { transform: rotate(360deg); } }
    #state-empty {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 80px 20px; color: var(--text-secondary);
    }
    #state-empty svg { opacity: 0.3; }
    #results-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
    #results-info strong { color: var(--text-primary); }

    /* ── Grid ───────────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    .card:hover {
      border-color: #3a3a3a; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .card-thumb {
      position: relative; aspect-ratio: 1/1;
      background: #0d0d0d; overflow: hidden;
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: contain; display: block;
      transition: transform 0.3s ease;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .thumb-fallback {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--text-dim); font-size: 12px;
    }
    .thumb-fallback svg { opacity: 0.4; }
    .category-pill {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px); border-radius: 20px;
      font-size: 10px; color: var(--text-secondary);
      padding: 3px 8px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: calc(100% - 16px);
    }
    .card-body { padding: 14px 14px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.3; word-break: break-word; }
    .card-usd  { font-size: 11px; color: var(--text-dim); font-family: 'Consolas','Courier New',monospace; word-break: break-all; }
    .card-footer { padding: 0 14px 14px; display: flex; gap: 8px; }
    .btn-download {
      flex: 1; background: var(--nv-green); color: #000; border: none;
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 700;
      padding: 8px 0; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: background var(--transition), transform var(--transition);
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    body.staging .btn-download { background: var(--staging-color); }
    body.staging .btn-download:hover { background: #c8841a; }
    .btn-download:hover { background: var(--nv-green-dim); transform: translateY(-1px); }
    .btn-s3 {
      background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 11px; padding: 8px 10px;
      cursor: pointer; transition: all var(--transition); white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-s3:hover, .btn-s3.copied { border-color: var(--nv-green); color: var(--nv-green); }
    body.staging .btn-s3:hover, body.staging .btn-s3.copied { border-color: var(--staging-color); color: var(--staging-color); }

    /* Download folder button */
    .btn-folder {
      flex: 1; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      padding: 8px 0; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all var(--transition);
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .btn-folder:hover { border-color: var(--nv-green); color: var(--nv-green); }
    body.staging .btn-folder:hover { border-color: var(--staging-color); color: var(--staging-color); }
    .btn-folder.saved { border-color: var(--nv-green); color: var(--nv-green); }

    /* Toast notification */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #1e1e1e; border: 1px solid #333;
      color: var(--text-primary); font-size: 13px;
      padding: 12px 20px; border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none; z-index: 999; max-width: 90vw; text-align: center;
      white-space: pre-line;
    }
    #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast strong { color: var(--nv-green); }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    @media (max-width: 600px) {
      header, #staging-banner, .toolbar, main { padding-left: 16px; padding-right: 16px; }
      .header-title { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">NV</div>
    <div>
      <div class="logo-text">Omniverse</div>
      <div class="logo-sub">Isaac SimReady</div>
    </div>
  </a>
  <div class="header-divider"></div>
  <div class="header-title">Asset Browser</div>
  <div class="header-spacer"></div>

  <!-- Environment toggle -->
  <div class="env-toggle">
    <button class="env-btn active-prod" id="btn-prod" onclick="setEnv('production')">Production</button>
    <button class="env-btn" id="btn-staging" onclick="setEnv('staging')">Staging</button>
  </div>

  <div id="badge"><span id="badge-count">…</span> assets</div>
</header>

<!-- Staging warning banner -->
<div id="staging-banner">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
  Browsing <strong>STAGING</strong> — omniverse-content-staging. Assets may differ from production.
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Search assets — e.g. cardboard box, pallet rack, canned food…" autocomplete="off" />
  </div>
  <select id="filter-category">
    <option value="">All Categories</option>
    <option value="Industrial">Industrial</option>
    <option value="Residential">Residential</option>
    <option value="Natural">Natural</option>
  </select>
  <button class="btn-clear" id="btn-clear">Clear</button>
</div>

<main>
  <div id="state-loading">
    <div class="spinner"></div>
    <div>Scanning S3 for assets…</div>
  </div>
  <div id="state-empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <div>No assets match your search.</div>
  </div>
  <div id="results-info"></div>
  <div id="grid"></div>
</main>

<div id="toast"></div>

<script>
const DATASETS = { production: [], staging: [] };
const COUNTS   = { production: 0,  staging: 0  };

let currentEnv    = 'production';
let _assetsLoaded = false;

function loadAssets() {
  // Fetch from the local server's /assets endpoint.
  // The server fetches from S3 server-side (no CORS restrictions), so this always works.
  fetch('/assets')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      DATASETS.production = data.production || [];
      DATASETS.staging    = data.staging    || [];
      COUNTS.production   = DATASETS.production.length;
      COUNTS.staging      = DATASETS.staging.length;
      _assetsLoaded = true;
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('badge-count').textContent = COUNTS[currentEnv];
      filterAndRender();
    })
    .catch(function(err) {
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('results-info').innerHTML =
        '<span style="color:#e05050">⚠ Could not load assets: ' + err.message + '</span>';
      console.error('loadAssets error:', err);
    });
}

// ── Toast notification ───────────────────────────────────────────────
function showToast(html, duration) {
  duration = duration || 5000;
  const t = document.getElementById('toast');
  t.innerHTML = html;
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('visible'); }, duration);
}

// ── Python script generator ──────────────────────────────────────────
function generateDownloadScript(bucket, prefix, name) {
  var b = JSON.stringify(bucket);
  var p = JSON.stringify(prefix);
  var safeN = name.replace(/[^a-zA-Z0-9]+/g, '_');
  return (
'#!/usr/bin/env python3\n'
+ '"""\n'
+ 'SimReady Asset Downloader\n'
+ 'Asset : ' + name + '\n'
+ '\n'
+ 'Run this script to download the complete asset folder as a ZIP.\n'
+ 'Requires Python 3 only -- no pip installs needed.\n'
+ 'Saves to: ~/Downloads/' + safeN + '.zip\n'
+ '"""\n'
+ 'import urllib.request, urllib.parse, zipfile, io, re, os, sys\n'
+ '\n'
+ 'BUCKET = ' + b + '\n'
+ 'PREFIX = ' + p + '\n'
+ '\n'
+ 'SKIP_PREFIXES = (\'.thumbs/\', \'textures/.thumbs/\')\n'
+ 'SKIP_SUFFIXES = (\'.wrapp\',)\n'
+ '\n'
+ '\n'
+ 'def s3_list(bucket, prefix):\n'
+ '    url = (\'https://\' + bucket + \'.s3.amazonaws.com/\'\n'
+ '           \'?list-type=2&prefix=\' + urllib.parse.quote(prefix, safe=\'\')\n'
+ '           + \'&max-keys=1000\')\n'
+ '    with urllib.request.urlopen(url, timeout=30) as r:\n'
+ '        xml = r.read().decode(\'utf-8\')\n'
+ '    keys = re.findall(r\'<Key>([^<]+)</Key>\', xml)\n'
+ '    return [k.replace(\'&amp;\', \'&\').replace(\'&lt;\', \'<\').replace(\'&gt;\', \'>\') for k in keys]\n'
+ '\n'
+ '\n'
+ 'def should_skip(key, prefix):\n'
+ '    rel = key[len(prefix):]\n'
+ '    return (any(rel.startswith(p) for p in SKIP_PREFIXES) or\n'
+ '            any(rel.endswith(s)   for s in SKIP_SUFFIXES))\n'
+ '\n'
+ '\n'
+ 'def main():\n'
+ '    print(\'=\' * 52)\n'
+ '    print(\'SimReady Asset Downloader\')\n'
+ '    print(\'Asset :\', ' + JSON.stringify(name) + ')\n'
+ '    print(\'Bucket:\', BUCKET)\n'
+ '    print(\'=\' * 52)\n'
+ '    print()\n'
+ '    print(\'Listing S3 files...\')\n'
+ '    try:\n'
+ '        all_keys = s3_list(BUCKET, PREFIX)\n'
+ '    except Exception as e:\n'
+ '        print(\'ERROR listing files:\', e)\n'
+ '        sys.exit(1)\n'
+ '\n'
+ '    keys = [k for k in all_keys\n'
+ '            if not k.endswith(\'/\') and not should_skip(k, PREFIX)]\n'
+ '    if not keys:\n'
+ '        print(\'ERROR: No files found under prefix:\')\n'
+ '        print(\' \', PREFIX)\n'
+ '        sys.exit(1)\n'
+ '    print(\'Found\', len(keys), \'files to download\')\n'
+ '    print()\n'
+ '\n'
+ '    base = \'https://\' + BUCKET + \'.s3.amazonaws.com/\'\n'
+ '    buf  = io.BytesIO()\n'
+ '    with zipfile.ZipFile(buf, \'w\', zipfile.ZIP_DEFLATED) as zf:\n'
+ '        for i, key in enumerate(keys, 1):\n'
+ '            rel = key[len(PREFIX):]\n'
+ '            sys.stdout.write(\'  [%3d/%d] %s\' % (i, len(keys), rel))\n'
+ '            sys.stdout.flush()\n'
+ '            url = base + urllib.parse.quote(key, safe=\'/\')\n'
+ '            try:\n'
+ '                with urllib.request.urlopen(url, timeout=60) as r:\n'
+ '                    zf.writestr(rel, r.read())\n'
+ '                print()\n'
+ '            except Exception as exc:\n'
+ '                print(\' -- SKIP:\', exc)\n'
+ '\n'
+ '    buf.seek(0)\n'
+ '    data = buf.read()\n'
+ '\n'
+ '    asset_name = PREFIX.rstrip(\'/\').rsplit(\'/\', 1)[-1]\n'
+ '    downloads  = os.path.join(os.path.expanduser(\'~\'), \'Downloads\')\n'
+ '    os.makedirs(downloads, exist_ok=True)\n'
+ '    out_path   = os.path.join(downloads, asset_name + \'.zip\')\n'
+ '    with open(out_path, \'wb\') as f:\n'
+ '        f.write(data)\n'
+ '\n'
+ '    size_mb = len(data) / (1024 * 1024)\n'
+ '    print()\n'
+ '    print(\'Done! Saved to:\', out_path)\n'
+ '    print(\'Size: %.1f MB  (%d files)\' % (size_mb, len(keys)))\n'
+ '\n'
+ '    try:\n'
+ '        if sys.platform == \'win32\':\n'
+ '            os.startfile(out_path)\n'
+ '        elif sys.platform == \'darwin\':\n'
+ '            import subprocess; subprocess.run([\'open\', out_path])\n'
+ '        else:\n'
+ '            import subprocess; subprocess.run([\'xdg-open\', out_path])\n'
+ '    except Exception:\n'
+ '        pass\n'
+ '\n'
+ '    if sys.platform == \'win32\':\n'
+ '        print()\n'
+ '        input(\'Press Enter to close...\')\n'
+ '\n'
+ '\n'
+ 'if __name__ == \'__main__\':\n'
+ '    main()\n'
  );
}

function setEnv(env) {
  currentEnv = env;
  document.body.classList.toggle('staging', env === 'staging');
  document.getElementById('btn-prod').className    = 'env-btn' + (env === 'production' ? ' active-prod'    : '');
  document.getElementById('btn-staging').className = 'env-btn' + (env === 'staging'    ? ' active-staging' : '');
  document.getElementById('badge-count').textContent = _assetsLoaded ? COUNTS[env] : '…';
  filterAndRender();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var FOLDER_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="12 11 12 17"/><polyline points="9 14 12 17 15 14"/></svg>';
var CHECK_ICON  = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

function renderCard(a) {
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = (
    '<div class="card-thumb">'
    + '<img src="' + esc(a.thumbUrl) + '" alt="' + esc(a.name) + '" loading="lazy"'
    + '     onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" />'
    + '<div class="thumb-fallback">'
    + '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">'
    + '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>'
    + '<polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>'
    + '</svg>No preview</div>'
    + '<span class="category-pill">' + esc(a.topCat) + '</span>'
    + '</div>'
    + '<div class="card-body">'
    + '<div class="card-name">' + esc(a.name) + '</div>'
    + '<div class="card-usd">'  + esc(a.usdFile) + '</div>'
    + '</div>'
    + '<div class="card-footer" style="flex-wrap:wrap; gap:6px;">'
    + '<a class="btn-download" href="' + esc(a.usdUrl) + '" download="' + esc(a.usdFile) + '" style="min-width:0; flex:1 1 auto;">'
    + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    + '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>'
    + '<polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>'
    + '</svg> USD</a>'
    + '<button class="btn-folder" data-bucket="' + esc(a.bucket) + '" data-prefix="' + esc(a.prefix) + '" data-name="' + esc(a.name) + '" style="min-width:0; flex:1 1 auto;"'
    + ' title="Download a Python script that fetches all asset files (USD + textures + payloads) into a ZIP">'
    + FOLDER_ICON + ' Folder</button>'
    + '<button class="btn-s3" data-uri="' + esc(a.s3Uri) + '" style="flex:0 0 auto;">'
    + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'
    + '<rect x="9" y="9" width="13" height="13" rx="2"/>'
    + '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>'
    + '</svg> S3</button>'
    + '</div>'
  );

  // Folder button — generate and download a self-contained Python script
  card.querySelector('.btn-folder').addEventListener('click', function() {
    var bucket = this.dataset.bucket;
    var prefix = this.dataset.prefix;
    var name   = this.dataset.name;
    var safeN  = name.replace(/[^a-zA-Z0-9]+/g, '_');

    var py   = generateDownloadScript(bucket, prefix, name);
    var blob = new Blob([py], { type: 'text/plain' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'download_' + safeN + '.py';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(
      '<strong>Script saved:</strong> download_' + safeN + '.py\n'
      + 'Run it with Python to download all asset files into ~/Downloads/' + safeN + '.zip'
    );

    var btn = this;
    btn.classList.add('saved');
    btn.innerHTML = CHECK_ICON + ' Saved';
    setTimeout(function() {
      btn.classList.remove('saved');
      btn.innerHTML = FOLDER_ICON + ' Folder';
    }, 2500);
  });

  card.querySelector('.btn-s3').addEventListener('click', function() {
    var btn = this;
    navigator.clipboard.writeText(this.dataset.uri).then(function() {
      btn.classList.add('copied');
      btn.innerHTML = (
        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
        + '<polyline points="20 6 9 17 4 12"/></svg> Copied'
      );
      setTimeout(function() {
        btn.classList.remove('copied');
        btn.innerHTML = (
          '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'
          + '<rect x="9" y="9" width="13" height="13" rx="2"/>'
          + '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>'
          + '</svg> S3'
        );
      }, 1800);
    });
  });

  return card;
}

function filterAndRender() {
  if (!_assetsLoaded) return;
  var query = document.getElementById('search').value.trim().toLowerCase();
  var catF  = document.getElementById('filter-category').value;
  var terms = query.split(/\s+/).filter(Boolean);

  var filtered = DATASETS[currentEnv];
  if (catF)   filtered = filtered.filter(function(a) { return a.topCat === catF; });
  if (terms.length) {
    filtered = filtered
      .map(function(a) {
        return { a: a, score: terms.reduce(function(s,t) { return s + (a.search.indexOf(t) >= 0 ? 1 : 0); }, 0) };
      })
      .filter(function(x) { return x.score > 0; })
      .sort(function(x,y) { return y.score - x.score; })
      .map(function(x) { return x.a; });
  }

  var grid  = document.getElementById('grid');
  var empty = document.getElementById('state-empty');
  var info  = document.getElementById('results-info');
  grid.innerHTML = '';

  if (!filtered.length) {
    empty.style.display = 'flex';
    info.textContent = '';
  } else {
    empty.style.display = 'none';
    var total = DATASETS[currentEnv].length;
    info.innerHTML = (terms.length || catF)
      ? 'Showing <strong>' + filtered.length + '</strong> of ' + total + ' assets'
      : '<strong>' + filtered.length + '</strong> assets';
    var frag = document.createDocumentFragment();
    filtered.forEach(function(a) { frag.appendChild(renderCard(a)); });
    grid.appendChild(frag);
  }
}

document.getElementById('search').addEventListener('input', filterAndRender);
document.getElementById('filter-category').addEventListener('change', filterAndRender);
document.getElementById('btn-clear').addEventListener('click', function() {
  document.getElementById('search').value = '';
  document.getElementById('filter-category').value = '';
  filterAndRender();
});

// Init
setEnv('production');
loadAssets();
document.getElementById('search').focus();
</script>
</body>
</html>
